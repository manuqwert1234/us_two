name: Titan CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'

      - name: Install Proto Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Proto
        run: make proto

      - name: Tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Test
        run: go test -v -race -count=1 ./internal/...

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -f Dockerfile.manager -t titan-manager:latest .
          docker build -f Dockerfile.worker -t titan-worker:latest .

      - name: Verify Images
        run: |
          docker images | grep titan
