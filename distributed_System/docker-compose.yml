version: "3.9"

networks:
  titan-net:
    driver: bridge

services:

  # ─── Manager (Control Plane) ────────────────────────────────────────────────
  titan-manager:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: titan-manager
    ports:
      - "50051:50051"
      - "8080:8080"
    networks:
      - titan-net
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Workers (Data Plane) ───────────────────────────────────────────────────
  titan-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: titan-worker-1
    environment:
      - WORKER_ID=worker-1
      - MANAGER_ADDR=titan-manager:50051
    networks:
      - titan-net
    depends_on:
      titan-manager:
        condition: service_healthy
    restart: unless-stopped

  titan-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: titan-worker-2
    environment:
      - WORKER_ID=worker-2
      - MANAGER_ADDR=titan-manager:50051
    networks:
      - titan-net
    depends_on:
      titan-manager:
        condition: service_healthy
    restart: unless-stopped

  titan-worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: titan-worker-3
    environment:
      - WORKER_ID=worker-3
      - MANAGER_ADDR=titan-manager:50051
    networks:
      - titan-net
    depends_on:
      titan-manager:
        condition: service_healthy
    restart: unless-stopped
